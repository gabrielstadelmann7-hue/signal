<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SIGNAL</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c0f;--surface:#13131a;
  --accent:#7c6dfa;--accent2:#fa6d9a;
  --text:#e8e8f0;--muted:rgba(232,232,240,0.38);
  --glow:rgba(124,109,250,0.25);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;}

/* ── CANVAS ── */
#cv{position:fixed;inset:0;z-index:0;}

/* ── GRAIN ── */
#grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:160px;animation:grn .5s steps(2) infinite;}
@keyframes grn{0%{transform:translate(0,0)}50%{transform:translate(-2%,2%)}100%{transform:translate(2%,-1%)}}

/* ── LAYOUT ── */
#app{
  position:relative;z-index:2;
  height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
}

/* ── LOGO ── */
.logo-wrap{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  margin-bottom:56px;
  animation:fadeUp .9s cubic-bezier(.16,1,.3,1) both;
}
.logo-mark{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:clamp(52px,8vw,88px);font-weight:400;line-height:1;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 40px rgba(124,109,250,0.4));
  letter-spacing:-2px;
}
.logo-sub{
  font-family:'Syne Mono',monospace;
  font-size:.6rem;letter-spacing:6px;text-transform:uppercase;
  color:var(--muted);
}

/* ── MENU ITEMS ── */
.menu{
  display:flex;flex-direction:column;gap:12px;
  align-items:center;width:100%;max-width:360px;
}
.menu-item{
  width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;
  background:rgba(19,19,26,.7);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  text-decoration:none;color:var(--text);
  backdrop-filter:blur(12px);
  transition:all .3s cubic-bezier(.16,1,.3,1);
  position:relative;overflow:hidden;
  animation:fadeUp .9s cubic-bezier(.16,1,.3,1) both;
}
.menu-item::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,109,250,0.08),rgba(250,109,154,0.06));
  opacity:0;transition:opacity .3s;
}
.menu-item:hover{
  border-color:rgba(124,109,250,0.4);
  transform:translateX(6px) scale(1.01);
  box-shadow:0 0 0 1px rgba(124,109,250,0.15), 0 20px 60px rgba(0,0,0,0.5);
}
.menu-item:hover::before{opacity:1}
.menu-item:nth-child(1){animation-delay:.1s}
.menu-item:nth-child(2){animation-delay:.18s}
.menu-item:nth-child(3){animation-delay:.26s}
.menu-item:nth-child(4){animation-delay:.34s}

.mi-left{display:flex;align-items:center;gap:16px;}
.mi-ic{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  transition:transform .3s;
}
.menu-item:hover .mi-ic{transform:rotate(-8deg) scale(1.1);}
.mi-txt{}
.mi-name{font-size:.95rem;font-weight:700;letter-spacing:.5px;margin-bottom:2px;}
.mi-desc{font-family:'Syne Mono',monospace;font-size:.55rem;letter-spacing:2px;color:var(--muted);}
.mi-arrow{
  font-size:.9rem;color:var(--muted);
  transition:transform .3s,color .3s;
}
.menu-item:hover .mi-arrow{transform:translateX(4px);color:var(--accent);}

/* Accent lines */
.menu-item.hot .mi-ic{background:linear-gradient(135deg,rgba(124,109,250,.15),rgba(250,109,154,.1));border-color:rgba(124,109,250,.2);}
.menu-item.hot{border-color:rgba(124,109,250,.15);}

/* ── FOOTER ── */
.footer{
  position:absolute;bottom:28px;
  font-family:'Syne Mono',monospace;font-size:.5rem;
  letter-spacing:4px;color:rgba(232,232,240,0.15);text-transform:uppercase;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── ONLINE BADGE ── */
.online-pill{
  display:inline-flex;align-items:center;gap:7px;
  font-family:'Syne Mono',monospace;font-size:.55rem;letter-spacing:2px;
  color:var(--muted);padding:6px 14px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:20px;margin-bottom:40px;
  animation:fadeUp .7s ease both;
}
.odot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80;animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="grain"></div>

<div id="app">
  <div class="logo-wrap">
    <div class="logo-mark">Signal</div>
    <div class="logo-sub">Plateforme communautaire</div>
  </div>

  <div class="online-pill">
    <div class="odot"></div>
    <span id="onlineCount">—</span> en ligne maintenant
  </div>

  <nav class="menu">
    <a href="signal-chat.html" class="menu-item hot">
      <div class="mi-left">
        <div class="mi-ic">💬</div>
        <div class="mi-txt">
          <div class="mi-name">Chat Public</div>
          <div class="mi-desc">MONDIAL · TEMPS RÉEL</div>
        </div>
      </div>
      <div class="mi-arrow">→</div>
    </a>
  </nav>

  <div class="footer">Signal © 2025 — Tous droits réservés</div>
</div>

<!-- THREE.JS pour les objets 3D -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════
// THREE.JS — Objets 3D flottants en fond
// ══════════════════════════════════════════
const canvas = document.getElementById('cv');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.z = 8;

// Materials
const matA = new THREE.MeshPhongMaterial({
  color:0x7c6dfa, wireframe:false, transparent:true, opacity:.18,
  shininess:100
});
const matB = new THREE.MeshPhongMaterial({
  color:0xfa6d9a, wireframe:false, transparent:true, opacity:.14,
  shininess:80
});
const matWire = new THREE.MeshBasicMaterial({
  color:0x7c6dfa, wireframe:true, transparent:true, opacity:.08
});
const matWire2 = new THREE.MeshBasicMaterial({
  color:0xfa6d9a, wireframe:true, transparent:true, opacity:.07
});

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);
const light1 = new THREE.PointLight(0x7c6dfa, 2, 20);
light1.position.set(5,5,5);
scene.add(light1);
const light2 = new THREE.PointLight(0xfa6d9a, 1.5, 20);
light2.position.set(-5,-3,3);
scene.add(light2);

// Geometries
const geos = [
  new THREE.IcosahedronGeometry(1.1, 0),
  new THREE.OctahedronGeometry(0.9, 0),
  new THREE.TetrahedronGeometry(0.8, 0),
  new THREE.IcosahedronGeometry(0.6, 0),
  new THREE.OctahedronGeometry(0.7, 0),
  new THREE.TetrahedronGeometry(1.0, 0),
  new THREE.IcosahedronGeometry(0.5, 0),
  new THREE.OctahedronGeometry(0.55, 0),
  new THREE.IcosahedronGeometry(0.75, 1),
  new THREE.OctahedronGeometry(1.2, 0),
  new THREE.TetrahedronGeometry(0.65, 0),
  new THREE.IcosahedronGeometry(0.45, 0),
];

const objects = [];
const spread = 9;

geos.forEach((geo, i) => {
  const isWire = i % 3 === 2;
  const mat = isWire
    ? (i % 6 === 2 ? matWire : matWire2)
    : (i % 2 === 0 ? matA.clone() : matB.clone());

  const mesh = new THREE.Mesh(geo, mat);

  // Random position — avoid center
  let x, y;
  do {
    x = (Math.random() - 0.5) * spread * 2;
    y = (Math.random() - 0.5) * spread;
  } while(Math.abs(x) < 2.5 && Math.abs(y) < 3);

  mesh.position.set(x, y, (Math.random()-0.5)*4 - 1);

  // Random rotation speeds
  mesh.userData = {
    rx: (Math.random()-0.5) * 0.008,
    ry: (Math.random()-0.5) * 0.012,
    rz: (Math.random()-0.5) * 0.006,
    floatSpeed: 0.3 + Math.random() * 0.5,
    floatAmp: 0.08 + Math.random() * 0.12,
    floatOffset: Math.random() * Math.PI * 2,
    baseY: y,
  };

  scene.add(mesh);
  objects.push(mesh);
});

// Mouse parallax
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animate
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  // Smooth camera parallax
  camera.position.x += (mouseX * 1.2 - camera.position.x) * 0.04;
  camera.position.y += (-mouseY * 0.8 - camera.position.y) * 0.04;
  camera.lookAt(scene.position);

  objects.forEach((obj, i) => {
    const d = obj.userData;
    obj.rotation.x += d.rx;
    obj.rotation.y += d.ry;
    obj.rotation.z += d.rz;
    // Float up/down
    obj.position.y = d.baseY + Math.sin(t * d.floatSpeed + d.floatOffset) * d.floatAmp;
  });

  // Animate lights
  light1.position.x = Math.sin(t * 0.4) * 6;
  light1.position.y = Math.cos(t * 0.3) * 4;
  light2.position.x = Math.cos(t * 0.35) * 5;
  light2.position.y = Math.sin(t * 0.28) * 3;

  renderer.render(scene, camera);
}
animate();

// ══════════════════════════════════════════
// FIREBASE — online count
// ══════════════════════════════════════════
// Quick check without full init — just fetch presence count
try {
  const s = document.createElement('script');
  s.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  s.onload = () => {
    const s2 = document.createElement('script');
    s2.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';
    s2.onload = () => {
      if(!firebase.apps.length){
        firebase.initializeApp({
          apiKey:"AIzaSyAQPHbwQT0K5WX4KsRFQBE4TpWAsVWIWmw",
          databaseURL:"https://sitechatsnt-default-rtdb.europe-west1.firebasedatabase.app"
        });
      }
      firebase.database().ref('signal_presence').on('value', snap => {
        document.getElementById('onlineCount').textContent = snap.numChildren() || '0';
      });
    };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
} catch(e){}
</script>
</body>
</html>
